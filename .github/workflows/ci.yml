name: CI Pipeline

on:
  push:
    branches: [ "main", "testes-unitarios" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - name: Instalar dependências
      run: composer install --prefer-dist --no-progress

    - name: Executar Testes Unitários
      run: vendor/bin/phpunit CalculadoraTest.php

    - name: Alerta Discord (Sucesso)
      if: success()
      uses: discord-actions/message@v2
      with:
        webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
        message: "✅ Testes unitários da Calculadora aprovados via GitHub Actions!"

    - name: Alerta Discord (Falha)
      if: failure()
      uses: discord-actions/message@v2
      with:
        webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
        message: "❌ Falha nos testes unitários da Calculadora."
